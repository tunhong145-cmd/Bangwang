<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>【男性健康特刊】霸王養精蓄力丹：重燃男兒本色</title>
    <style>
        body { font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif; margin: 0; padding: 0; background: #fdfdfd; color: #333; line-height: 1.8; padding-bottom: 80px; }
        .container { max-width: 600px; margin: 0 auto; background: white; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .content { padding: 20px; }
        .product-img { width: 100%; display: block; margin: 20px 0; border-radius: 8px; }
        
        /* 訂單表單區樣式 */
        .order-area { background: #1a1a1a; color: #fff; padding: 30px 20px; border-radius: 15px; border: 3px solid #fbc02d; margin-top: 30px; }
        .order-title { text-align: center; color: #fbc02d; margin-bottom: 25px; font-size: 24px; font-weight: bold; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #ddd; font-weight: bold; }
        .input-group input { width: 100%; height: 50px; border-radius: 8px; border: none; padding-left: 15px; font-size: 18px; box-sizing: border-box; background: #fff; }
        
        .phone-container { display: flex; align-items: center; background: #fff; border-radius: 8px; overflow: hidden; }
        .prefix { padding: 0 15px; color: #333; font-weight: bold; border-right: 1px solid #ccc; background: #eee; height: 50px; line-height: 50px; font-size: 18px; }
        .phone-container input { flex: 1; border: none; }

        .submit-btn { width: 100%; height: 65px; background: linear-gradient(180deg, #ff7043, #d32f2f); color: white; border: none; border-radius: 8px; font-size: 22px; font-weight: bold; cursor: pointer; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="container">
    <div class="content">
        <img src="product.png" alt="霸王養精蓄力丹" class="product-img">

        <div class="order-area" id="order-form">
            <h2 class="order-title">—— 貨到付款 · 隱私發貨 ——</h2>
            
            <form id="orderForm" action="https://docs.google.com/forms/d/e/1FAIpQLSe-sv68p-RQzX3I_pE6oNst3Y7P0Gv9-p3gN3fX1X8X1X8X1A/formResponse" method="POST" target="hidden_iframe">
                
                <div class="input-group">
                    <label>收貨人姓名：</label>
                    <input type="text" id="custName" name="entry.684888068" placeholder="請填寫您的真實繁體姓名" required>
                </div>

                <div class="input-group">
                    <label>聯繫電話：</label>
                    <div class="phone-container">
                        <span class="prefix">+886</span>
                        <input type="tel" id="userPhone" placeholder="請填寫您的手機號" required>
                    </div>
                    <input type="hidden" id="fullPhone" name="entry.385434363">
                </div>

                <button type="submit" class="submit-btn">立即提交訂單</button>
            </form>
        </div>
    </div>
</div>

<script type="text/javascript">var submitted=false;</script>
<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted){alert('恭喜您下單成功！我們將儘快與您聯繫確認訂單，請保持電話暢通。');window.location.reload();}"></iframe>

<script>
    document.getElementById('orderForm').onsubmit = function() {
        // 1. 姓名繁體中文驗證
        const nameInput = document.getElementById('custName');
        const nameRegex = /^[\u4E00-\u9FFF·]+$/;
        if (!nameRegex.test(nameInput.value)) {
            alert('請輸入正確的繁體中文姓名，不可包含英文或數字。');
            nameInput.focus();
            return false;
        }

        // 2. 自動合併台灣區號邏輯
        const phoneInput = document.getElementById('userPhone');
        let rawPhone = phoneInput.value.trim();
        // 如果用戶輸入 0912... 則去掉開頭的 0
        if (rawPhone.startsWith('0')) {
            rawPhone = rawPhone.substring(1);
        }
        // 將 +886 和號碼合併到隱藏的 entry 字段中
        document.getElementById('fullPhone').value = '+886' + rawPhone;

        // 3. 標記為已提交，觸發 iframe 的 onload 提示
        submitted = true;
        return true;
    };
</script>

</body>
</html>
