<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>【男性健康特刊】霸王養精蓄力丹：重燃男兒本色，找回巔峰自信！</title>
    <style>
        body { font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif; margin: 0; padding: 0; background: #fdfdfd; color: #333; line-height: 1.8; padding-bottom: 80px; }
        .header { background: #d32f2f; color: white; text-align: center; padding: 12px; font-weight: bold; font-size: 19px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding-bottom: 50px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .content { padding: 20px; }
        h1 { font-size: 26px; color: #111; line-height: 1.4; margin-bottom: 12px; }
        .product-img { width: 100%; display: block; margin: 25px 0; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .trust-img { width: 100%; display: block; margin: 35px auto; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.08)); }
        .price-tag { text-align: center; margin: 30px 0 10px 0; padding: 15px; background: #fff5f5; border-radius: 8px; border: 1px solid #ffcdd2; }
        .current-price { color: #d32f2f; font-size: 32px; font-weight: bold; }
        .order-area { background: #1a1a1a; color: #fff; padding: 30px 20px; border-radius: 15px; border: 3px solid #fbc02d; margin-top: 30px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #ddd; font-weight: bold; }
        .input-group input { width: 100%; height: 50px; border-radius: 8px; border: none; padding-left: 15px; font-size: 18px; box-sizing: border-box; }
        .phone-container { display: flex; align-items: center; background: #fff; border-radius: 8px; overflow: hidden; }
        .prefix { padding: 0 12px; color: #333; font-weight: bold; border-right: 1px solid #ccc; background: #eee; height: 50px; line-height: 50px; }
        .submit-btn { width: 100%; height: 65px; background: linear-gradient(180deg, #ff7043, #d32f2f); color: white; border: none; border-radius: 8px; font-size: 22px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">🔥 台灣男性健康特刊：限時特惠通道已開啟</div>

<div class="container">
    <div class="content">
        <img src="product.png" alt="霸王養精蓄力丹" class="product-img">

        <h1>告別「力不從心」的尷尬！這款被封為「霸王」的秘方，竟讓中年男人重回巔峰？</h1>

        <div class="price-tag">
            <span class="current-price">現價: 1398 <span style="font-size:18px;">TWD</span></span>
        </div>

        <div class="order-area" id="order-form">
            <h2 style="text-align:center; color:#fbc02d;">—— 貨到付款 · 隱私發貨 ——</h2>
            
            <form id="orderForm" action="這裡填寫你的Google表單ActionURL" method="POST" target="hidden_iframe">
                
                <div class="input-group">
                    <label>收貨人姓名：</label>
                    <input type="text" id="custName" name="entry.這裡填寫姓名ID" placeholder="請填寫您的真實繁體中文姓名" required>
                </div>

                <div class="input-group">
                    <label>聯繫電話：</label>
                    <div class="phone-container">
                        <span class="prefix">+886</span>
                        <input type="tel" id="userPhone" placeholder="請填寫您的手機號" required>
                    </div>
                    <input type="hidden" id="fullPhone" name="entry.這裡填寫電話ID">
                </div>

                <button type="submit" class="submit-btn">立即提交訂單</button>
            </form>
        </div>
    </div>
</div>

<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted){alert('訂單提交成功！我們將儘快與您聯繫。');window.location.reload();}"></iframe>

<script>
    var submitted = false;
    document.getElementById('orderForm').onsubmit = function() {
        const nameInput = document.getElementById('custName');
        const nameRegex = /^[\u4E00-\u9FFF·]+$/;
        if (!nameRegex.test(nameInput.value)) {
            alert('請輸入正確的繁體中文姓名。');
            return false;
        }

        const phoneInput = document.getElementById('userPhone');
        let rawPhone = phoneInput.value.trim();
        if (rawPhone.startsWith('0')) rawPhone = rawPhone.substring(1);
        document.getElementById('fullPhone').value = '+886' + rawPhone;

        submitted = true;
        return true;
    };
</script>

</body>
</html>
