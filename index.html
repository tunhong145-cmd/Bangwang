<form id="orderForm" action="https://docs.google.com/forms/d/e/1FAIpQLSe-sv68p-RQzX3I_pE6oNst3Y7P0Gv9-p3gN3fX1X8X1X8X1A/formResponse" method="POST" target="hidden_iframe">
    <div class="input-group">
        <label>收貨人姓名：</label>
        <input type="text" id="custName" name="entry.684888068" placeholder="請填寫您的真實繁體中文姓名" required>
    </div>

    <div class="input-group">
        <label>聯繫電話：</label>
        <div class="phone-container">
            <span class="prefix">+886</span>
            <input type="tel" id="userPhone" placeholder="請填寫您的手機號" required>
        </div>
        <input type="hidden" id="fullPhone" name="entry.385434363">
    </div>

    <div style="margin-bottom: 20px; font-size: 14px; color: #ddd;">
        註：我們將採用保密包裝，面單不顯示任何產品名稱，貨到付款，安全無憂。
    </div>
    <button type="submit" class="submit-btn">
        立即提交訂單 (專人電話確認後發貨)
        <span class="btn-subtext" style="font-size:14px; font-weight:normal;">確認地址後即刻發貨</span>
    </button>
</form>

<script type="text/javascript">var submitted=false;</script>
<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted){alert('恭喜您下單成功！我們將儘快與您聯繫確認訂單，請保持電話暢通。');window.location.reload();}"></iframe>

<script>
    document.getElementById('date').innerText = new Date().toLocaleDateString();
    
    // 倒計時
    let time = 900;
    const timerDisplay = document.getElementById('countdown');
    setInterval(() => {
        let minutes = Math.floor(time / 60);
        let seconds = time % 60;
        seconds = seconds < 10 ? '0' + seconds : seconds;
        if(timerDisplay) timerDisplay.innerHTML = `${minutes}:${seconds}`;
        if (time > 0) time--;
    }, 1000);

    // 滾動列表
    const scrollList = document.getElementById('scroll-list');
    setInterval(() => {
        if (scrollList && scrollList.children.length > 1) {
            scrollList.appendChild(scrollList.firstElementChild);
        }
    }, 3000);

    // 懸浮按鈕跳轉
    document.getElementById('floating-btn').addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelector('#order-form').scrollIntoView({ behavior: 'smooth' });
    });

    // 表單提交處理邏輯
    document.getElementById('orderForm').onsubmit = function() {
        const nameInput = document.getElementById('custName');
        const phoneInput = document.getElementById('userPhone');
        const fullPhoneHidden = document.getElementById('fullPhone');
        
        // 1. 繁體中文姓名驗證
        const nameRegex = /^[\u4E00-\u9FFF·]+$/;
        if (!nameRegex.test(nameInput.value)) {
            alert('請輸入正確的繁體中文姓名，不可包含英文或數字。');
            nameInput.focus();
            return false;
        }

        // 2. 電話區號合併邏輯 (台灣格式優化)
        let rawPhone = phoneInput.value.trim();
        if (rawPhone.startsWith('0')) {
            rawPhone = rawPhone.substring(1);
        }
        fullPhoneHidden.value = '+886' + rawPhone;
        
        // 3. 標記提交狀態，觸發彈窗
        submitted = true;
        return true;
    };
</script>
